[package]
name = "core-agent-tool"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Tool Runtime — provider-neutral capability discovery and execution"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
# External HTTP/file schema retrieval is deliberately disabled.
jsonschema = { version = "0.33", default-features = false }
glob = "0.3"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt", "sync", "time", "process", "fs", "io-util"] }
tokio-util = "0.7"
uuid = { version = "1", features = ["v4", "serde"] }

# LSP support
lsp-types = "0.95"

# Planning
core-agent-plan = { path = "../core-agent-plan" }

# Persistence
rusqlite = { version = "0.32", features = ["bundled"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full"] }
